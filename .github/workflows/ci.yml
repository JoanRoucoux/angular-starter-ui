name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:coverage

      - name: Build library
        run: pnpm run build

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Storybook interaction tests
        run: pnpm run test-storybook:ci

      - name: Upload Storybook build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() }}
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 30

  # Guards against drift between the starter and its generator manifest/templates
  # (generator.config.json, .generator/templates/): generates a project from this
  # working tree with starter-generator and runs the project's own quality gates.
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Fetch starter-generator
        run: |
          git clone --depth 1 https://github.com/JoanRoucoux/starter-generator "$RUNNER_TEMP/starter-generator"
          pnpm install --frozen-lockfile --dir "$RUNNER_TEMP/starter-generator"

      - name: Generate a project from this working tree
        run: node "$RUNNER_TEMP/starter-generator/index.mjs" "$RUNNER_TEMP/generated/ci-check-ui" --template . --title "CI Check" --skip-install --skip-git --yes

      - name: Install generated project dependencies
        working-directory: ${{ runner.temp }}/generated/ci-check-ui
        run: pnpm install

      # Mirrors the generator's postInstall step (skipped above with --skip-install).
      - name: Format the generated project
        working-directory: ${{ runner.temp }}/generated/ci-check-ui
        run: pnpm run format

      - name: Check the generated project (format, lint, tests, build)
        working-directory: ${{ runner.temp }}/generated/ci-check-ui
        run: |
          pnpm run format:check
          pnpm run lint
          pnpm run test:coverage
          pnpm run build
