version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      angular:
        patterns:
          - '@angular/*'
          - 'angular-eslint'
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
          - 'eslint-plugin-storybook'
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - '@angular/*'
          - 'angular-eslint'
          - 'storybook'
          - '@storybook/*'
          - 'eslint-plugin-storybook'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
